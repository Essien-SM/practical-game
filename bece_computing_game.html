<style>
:root{
  --navy:#0a2342;--navy2:#1a3a5c;--gold:#f59e0b;--gold2:#fbbf24;
  --teal:#0d9488;--teal2:#14b8a6;--green:#16a34a;--red:#dc2626;
  --sky:#e0f2fe;--cream:#fffbeb;--body-bg:#f0f6ff;
  --card-bg:#ffffff;--text:#1e293b;--muted:#64748b;--border:#cbd5e1;
  --radius:14px;--shadow:0 4px 24px rgba(10,35,66,.10);
}
*{box-sizing:border-box;}
body{
  font-family:'Nunito',sans-serif;background:var(--body-bg);color:var(--text);
  min-height:100vh;padding-bottom:2rem;
}

/* ===== HERO HEADER ===== */
#hero{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,#1e4d8c 100%);
  padding:2rem 1rem 3.5rem;text-align:center;position:relative;overflow:hidden;
}
#hero::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 1px,transparent 30px);
}
#hero h1{
  font-family:'Orbitron',sans-serif;font-size:clamp(1.3rem,4vw,2rem);
  color:#fff;font-weight:900;letter-spacing:.04em;position:relative;
}
#hero p{color:var(--gold2);font-size:.95rem;font-weight:700;margin-top:.25rem;position:relative;}
.badge-pill{
  display:inline-block;background:var(--gold);color:var(--navy);
  font-size:.7rem;font-weight:800;padding:3px 10px;border-radius:20px;margin:.5rem .2rem 0;
}

/* ===== PROGRESS STRIP ===== */
#progress-strip{
  background:var(--navy);padding:.75rem 1rem;
  display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25);
}
#prog-bar-wrap{flex:1;background:rgba(255,255,255,.15);border-radius:20px;height:10px;min-width:80px;}
#prog-bar-fill{height:10px;border-radius:20px;background:linear-gradient(90deg,var(--teal2),var(--gold));transition:width .5s ease;}
#prog-label{color:#fff;font-size:.78rem;font-weight:700;white-space:nowrap;}
#score-badge{
  background:var(--gold);color:var(--navy);font-weight:800;
  font-size:.82rem;padding:4px 14px;border-radius:20px;white-space:nowrap;
}

/* ===== MAIN CARD ===== */
#main-wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem 0;}
#game-card{
  background:var(--card-bg);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden;
}
#card-header{
  background:linear-gradient(90deg,var(--navy2),#1e4d8c);
  padding:1rem 1.25rem;display:flex;align-items:center;gap:.75rem;
}
#round-type-pill{
  background:var(--gold);color:var(--navy);font-size:.65rem;font-weight:800;
  padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;
}
#round-title-text{color:#fff;font-weight:800;font-size:1rem;flex:1;}
#round-num-badge{color:var(--gold2);font-size:.78rem;font-weight:700;white-space:nowrap;}
#card-body{padding:1.25rem;}
#round-instructions{
  background:var(--sky);border-left:4px solid var(--teal2);
  border-radius:0 8px 8px 0;padding:.6rem 1rem;font-size:.82rem;
  color:#0369a1;font-weight:600;margin-bottom:1.1rem;
}

/* ===== FEEDBACK ===== */
#feedback{
  border-radius:10px;padding:.7rem 1rem;font-size:.85rem;font-weight:700;
  text-align:center;display:none;margin:.75rem 0;
  animation:fadeSlide .3s ease;
}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
#feedback.correct{background:#dcfce7;color:#15803d;border:1.5px solid #86efac;}
#feedback.wrong{background:#fee2e2;color:#b91c1c;border:1.5px solid #fca5a5;}
#feedback.partial{background:#fef9c3;color:#92400e;border:1.5px solid #fde68a;}

/* ===== ACTION BUTTONS ===== */
.btn-check-ans{
  background:var(--navy2);color:#fff;border:none;
  font-weight:800;font-size:.85rem;padding:.55rem 1.5rem;border-radius:10px;
  transition:all .15s;
}
.btn-check-ans:hover{background:var(--navy);transform:translateY(-1px);}
.btn-next-round{
  background:var(--gold);color:var(--navy);border:none;
  font-weight:800;font-size:.85rem;padding:.55rem 1.5rem;border-radius:10px;
  transition:all .15s;display:none;
}
.btn-next-round:hover{background:var(--gold2);}

/* ===== DIAGRAM / LABEL GAME ===== */
#diagram-wrap{
  position:relative;background:#f8fafc;border:1.5px solid var(--border);
  border-radius:10px;overflow:hidden;margin-bottom:.9rem;
}
#diagram-wrap svg{display:block;width:100%;height:auto;}
.drop-zone{
  position:relative;background:#fff;border:2px dashed var(--border);
  border-radius:4px;font-size:7px;font-weight:700;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  text-align:center;padding:1px 3px;cursor:default;
  transition:border-color .15s,background .15s,color .15s;
  line-height:1.1;min-height:20px;box-sizing:border-box;
  white-space:nowrap;overflow:hidden;
}
.drop-zone.drag-over{border-color:var(--gold);background:#fef9ee;color:var(--navy);}
.drop-zone.filled{border-style:solid;border-color:var(--teal2);background:#f0fdfa;color:var(--teal);}
.drop-zone.correct-ans{border-color:var(--green)!important;background:#dcfce7!important;color:#15803d!important;border-style:solid!important;}
.drop-zone.wrong-ans{border-color:var(--red)!important;background:#fee2e2!important;color:#b91c1c!important;border-style:solid!important;}
#label-pool{
  display:flex;flex-wrap:wrap;gap:.4rem;
  background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:.6rem .75rem;
}
#label-pool-title{font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem;}
.drag-label{
  background:var(--navy2);color:#fff;border-radius:7px;
  font-size:.7rem;font-weight:700;padding:5px 10px;
  cursor:grab;user-select:none;border:1.5px solid rgba(255,255,255,.15);
  transition:opacity .15s,transform .1s;
}
.drag-label:active{cursor:grabbing;opacity:.75;transform:scale(.97);}
.drag-label.used{opacity:.25;cursor:not-allowed;pointer-events:none;}

/* ===== STEPS GAME ===== */
.steps-list{display:flex;flex-direction:column;gap:.45rem;}
.step-item{
  display:flex;align-items:center;gap:.6rem;
  background:#fff;border:1.5px solid var(--border);border-radius:9px;
  padding:.55rem .85rem;cursor:grab;user-select:none;
  transition:box-shadow .15s,border-color .15s,background .15s;font-size:.82rem;
}
.step-item:active{cursor:grabbing;box-shadow:0 6px 20px rgba(0,0,0,.15);}
.step-item.dragging{opacity:.45;}
.step-item.drag-over-step{border-color:var(--gold);box-shadow:0 0 0 3px #fef3c740;}
.step-item.correct-step{border-color:var(--green);background:#dcfce7;color:#15803d;}
.step-item.wrong-step{border-color:var(--red);background:#fee2e2;color:#b91c1c;}
.step-handle{color:#94a3b8;font-size:1.1rem;line-height:1;flex-shrink:0;}
.step-num{
  min-width:26px;height:26px;border-radius:50%;
  background:var(--sky);border:1.5px solid #bae6fd;
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:800;color:#0369a1;flex-shrink:0;
}
.step-text{flex:1;color:var(--text);font-weight:600;line-height:1.4;}

/* ===== FINAL SCREEN ===== */
#final-screen{
  display:none;text-align:center;padding:2.5rem 1.5rem;
  background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);
  max-width:520px;margin:2rem auto;
}
#final-trophy{font-size:4rem;line-height:1;}
#final-title{font-family:'Orbitron',sans-serif;font-size:1.3rem;color:var(--navy);font-weight:900;margin:.5rem 0;}
#final-score-ring{
  width:120px;height:120px;border-radius:50%;
  border:6px solid var(--gold);background:var(--cream);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:1rem auto;
}
#final-score-num{font-size:2rem;font-weight:900;color:var(--navy);line-height:1;}
#final-score-max{font-size:.75rem;font-weight:700;color:var(--muted);}
#final-msg{font-size:.9rem;color:var(--muted);font-weight:600;max-width:340px;margin:.75rem auto 1.25rem;}
.btn-restart{
  background:var(--navy2);color:#fff;border:none;font-weight:800;
  font-size:.9rem;padding:.6rem 2rem;border-radius:10px;transition:all .15s;
}
.btn-restart:hover{background:var(--navy);}

/* ===== CATEGORY ICONS ===== */
.round-icon{font-size:1.1rem;}

/* Touch support */
@media(max-width:576px){
  #hero h1{font-size:1.2rem;}
  .drag-label{font-size:.65rem;padding:4px 8px;}
  .drop-zone{font-size:.6rem;}
  .step-item{font-size:.75rem;}
}
</style>

/* =====================================================================
   STATE
===================================================================== */
let round=0, score=0, answered=false;
let dragLabel=null, dragSrcStepIdx=-1;
let stepOrder=[];

/* =====================================================================
   INIT
===================================================================== */
function init(){
  round=0; score=0; answered=false;
  document.getElementById('final-screen').style.display='none';
  document.getElementById('game-card').style.display='block';
  renderRound();
}

function renderRound(){
  const r=ROUNDS[round];
  answered=false;
  document.getElementById('feedback').style.display='none';
  document.getElementById('btn-check').style.display='inline-block';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('prog-label').textContent=`Round ${round+1}/${ROUNDS.length}`;
  document.getElementById('score-badge').innerHTML=`<i class="bi bi-star-fill me-1"></i>Score: ${score}`;
  document.getElementById('prog-bar-fill').style.width=`${(round/ROUNDS.length)*100}%`;
  document.getElementById('round-type-pill').innerHTML=
    r.type==='label'
      ? `<i class="bi ${r.icon} me-1"></i>Label the Diagram`
      : `<i class="bi ${r.icon} me-1"></i>Arrange the Steps`;
  document.getElementById('round-title-text').textContent=r.title;
  document.getElementById('round-num-badge').textContent=`${round+1} / ${ROUNDS.length}`;
  document.getElementById('round-instructions').textContent=r.instructions;
  if(r.type==='label') renderLabelRound(r);
  else renderStepsRound(r);
}

/* =====================================================================
   LABEL ROUND
===================================================================== */
function renderLabelRound(r){
  const content=document.getElementById('round-content');
  const shuffled=[...r.labels].sort(()=>Math.random()-.5);
  content.innerHTML=`
    <div id="diagram-wrap">${r.svg}</div>
    <div id="label-pool">
      <div id="label-pool-title"><i class="bi bi-tags-fill me-1"></i>Label chips — drag to diagram</div>
      <div id="chips-row" style="display:flex;flex-wrap:wrap;gap:.4rem;"></div>
    </div>`;

  /* Inject drop zones as foreignObject inside the SVG so they share the same
     coordinate system as the connector lines — no scaling mismatch possible */
  const svg=document.querySelector('#diagram-wrap svg');
  const NS='http://www.w3.org/2000/svg';
  const BOX_H=20; // height of each drop-zone box in SVG units

  r.dropZones.forEach(dz=>{
    const fo=document.createElementNS(NS,'foreignObject');
    fo.setAttribute('x', dz.x);
    fo.setAttribute('y', dz.y);
    fo.setAttribute('width', dz.w);
    fo.setAttribute('height', BOX_H);
    fo.setAttribute('overflow','visible');

    const el=document.createElement('div');
    el.className='drop-zone'; el.id=dz.id; el.dataset.correct=dz.correct;
    el.style.cssText=`width:${dz.w}px;height:${BOX_H}px;font-size:7px;min-height:${BOX_H}px;border-radius:4px;`;
    el.textContent='Drop here';

    /* Desktop drag */
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{
      e.preventDefault(); el.classList.remove('drag-over');
      if(!dragLabel) return;
      returnFilledLabel(el);
      el.textContent=dragLabel; el.dataset.label=dragLabel; el.classList.add('filled');
      document.querySelector(`.drag-label[data-val="${dragLabel}"]`)?.remove();
      dragLabel=null;
    });
    /* Touch */
    el.addEventListener('touchend',e=>{
      e.preventDefault();
      if(!window._touchDragging) return;
      const chip=window._touchDragging;
      returnFilledLabel(el);
      el.textContent=chip.dataset.val; el.dataset.label=chip.dataset.val; el.classList.add('filled');
      chip.remove();
      cleanTouchDrag();
    },{passive:false});

    fo.appendChild(el);
    svg.appendChild(fo);
  });

  /* Chips */
  const row=document.getElementById('chips-row');
  shuffled.forEach(lbl=>{
    row.appendChild(makeChip(lbl));
  });
}

function returnFilledLabel(el){
  const old=el.dataset.label;
  if(old){
    document.getElementById('chips-row').appendChild(makeChip(old));
    el.dataset.label=''; el.classList.remove('filled');
  }
}

function makeChip(lbl){
  const el=document.createElement('div');
  el.className='drag-label'; el.draggable=true;
  el.textContent=lbl; el.dataset.val=lbl;
  el.addEventListener('dragstart',()=>{dragLabel=lbl; el.dataset.val=lbl;});
  el.addEventListener('dragend',()=>{ dragLabel=null; });
  /* Touch drag */
  el.addEventListener('touchstart',e=>{
    e.stopPropagation();
    window._touchDragging=el;
    const ghost=el.cloneNode(true);
    ghost.style.cssText='position:fixed;opacity:.75;pointer-events:none;z-index:9999;background:#1a3a5c;color:#fff;padding:5px 10px;border-radius:7px;font-size:.7rem;font-weight:700;';
    document.body.appendChild(ghost);
    window._touchGhost=ghost;
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    const t=e.touches[0];
    if(window._touchGhost){
      window._touchGhost.style.left=(t.clientX-30)+'px';
      window._touchGhost.style.top=(t.clientY-14)+'px';
    }
    e.preventDefault();
  },{passive:false});
  el.addEventListener('touchend',e=>{
    cleanTouchDrag();
    const t=e.changedTouches[0];
    const target=document.elementFromPoint(t.clientX,t.clientY);
    const dz=target?.closest('.drop-zone');
    if(dz){
      returnFilledLabel(dz);
      dz.textContent=lbl; dz.dataset.label=lbl; dz.classList.add('filled');
      el.remove();
    }
  },{passive:true});
  return el;
}

function cleanTouchDrag(){
  window._touchGhost?.remove(); window._touchGhost=null;
  window._touchDragging=null;
}

/* =====================================================================
   STEPS ROUND
===================================================================== */
function renderStepsRound(r){
  stepOrder=[...r.steps].sort(()=>Math.random()-.5);
  const content=document.getElementById('round-content');
  content.innerHTML='<div class="steps-list" id="steps-list"></div>';
  buildStepItems();
}

function buildStepItems(){
  const list=document.getElementById('steps-list');
  list.innerHTML='';
  stepOrder.forEach((step,i)=>{
    const el=document.createElement('div');
    el.className='step-item'; el.draggable=true; el.dataset.idx=i;
    el.innerHTML=`<span class="step-handle"><i class="bi bi-grip-vertical"></i></span>
      <span class="step-num">${i+1}</span>
      <span class="step-text">${step}</span>`;
    /* Desktop drag */
    el.addEventListener('dragstart',()=>{ dragSrcStepIdx=i; el.classList.add('dragging'); });
    el.addEventListener('dragend',()=>{ el.classList.remove('dragging'); });
    el.addEventListener('dragover',e=>{ e.preventDefault(); el.classList.add('drag-over-step'); });
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over-step'));
    el.addEventListener('drop',e=>{
      e.preventDefault(); el.classList.remove('drag-over-step');
      const t=parseInt(el.dataset.idx);
      if(dragSrcStepIdx===t) return;
      const moved=stepOrder.splice(dragSrcStepIdx,1)[0];
      stepOrder.splice(t,0,moved);
      buildStepItems();
    });
    /* Touch drag for steps */
    el.addEventListener('touchstart',()=>{ dragSrcStepIdx=i; },{passive:true});
    el.addEventListener('touchend',e=>{
      const t=e.changedTouches[0];
      const target=document.elementFromPoint(t.clientX,t.clientY)?.closest('.step-item');
      if(target&&target!==el){
        const tidx=parseInt(target.dataset.idx);
        const moved=stepOrder.splice(dragSrcStepIdx,1)[0];
        stepOrder.splice(tidx,0,moved);
        buildStepItems();
      }
    },{passive:true});
    list.appendChild(el);
  });
}

/* =====================================================================
   CHECK ANSWER
===================================================================== */
function checkAnswer(){
  if(answered) return;
  answered=true;
  const r=ROUNDS[round];
  const fb=document.getElementById('feedback');
  let correct=0,total=0;

  if(r.type==='label'){
    r.dropZones.forEach(dz=>{
      total++;
      const el=document.getElementById(dz.id);
      if(el.dataset.label===dz.correct){ correct++; el.classList.add('correct-ans'); }
      else { el.classList.add('wrong-ans'); el.title='✓ '+dz.correct; }
    });
  } else {
    const r2=ROUNDS[round];
    stepOrder.forEach((step,i)=>{
      total++;
      const el=document.querySelectorAll('.step-item')[i];
      if(step===r2.steps[i]){ correct++; el.classList.add('correct-step'); }
      else el.classList.add('wrong-step');
    });
  }
  const pct=Math.round((correct/total)*100);
  const pts=Math.round((correct/total)*10);
  score+=pts;
  document.getElementById('score-badge').innerHTML=`<i class="bi bi-star-fill me-1"></i>Score: ${score}`;
  if(pct===100){
    fb.className='feedback correct'; fb.innerHTML=`<i class="bi bi-check-circle-fill me-1"></i>Perfect! All ${total} correct! +${pts} points`;
  } else if(pct>=60){
    fb.className='feedback partial'; fb.innerHTML=`<i class="bi bi-exclamation-circle-fill me-1"></i>${correct}/${total} correct. +${pts} points — review the highlighted ones!`;
  } else {
    fb.className='feedback wrong'; fb.innerHTML=`<i class="bi bi-x-circle-fill me-1"></i>Only ${correct}/${total} correct. Study the diagram/steps and try again!`;
  }
  fb.style.display='block';
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-next').style.display='inline-block';
}

/* =====================================================================
   NAVIGATION
===================================================================== */
function nextRound(){
  round++;
  if(round>=ROUNDS.length){ showFinal(); return; }
  renderRound();
}

function showFinal(){
  document.getElementById('game-card').style.display='none';
  document.getElementById('prog-bar-fill').style.width='100%';
  document.getElementById('prog-label').textContent='Completed!';
  const max=ROUNDS.length*10;
  const pct=Math.round((score/max)*100);
  const fs=document.getElementById('final-screen');
  fs.style.display='block';
  document.getElementById('final-score-num').textContent=score;
  document.getElementById('final-score-max').textContent=`out of ${max}`;
  document.getElementById('final-trophy').textContent=pct>=90?'🏆':pct>=70?'🎖️':pct>=50?'📚':'🎯';
  document.getElementById('final-msg').textContent=
    pct>=90?'Outstanding! You are fully prepared for BECE practicals!':
    pct>=70?'Well done! A little more practice and you will ace it!':
    pct>=50?'Good effort! Review the diagrams and steps more carefully.':
    'Keep going — study the notes and try again. You can do it!';
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt=e;
  // Show install banner after a short delay
  setTimeout(()=>{
    if(deferredPrompt){
      const banner=document.createElement('div');
      banner.id='install-banner';
      banner.innerHTML=`
        <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;">
          <i class="bi bi-phone-fill" style="font-size:1.4rem;color:#f59e0b;"></i>
          <span style="flex:1;font-size:.82rem;font-weight:700;color:#fff;">Install this game as an app on your phone!</span>
          <button id="btn-install" style="background:#f59e0b;color:#0a2342;border:none;font-weight:800;font-size:.78rem;padding:6px 14px;border-radius:8px;cursor:pointer;">Install</button>
          <button id="btn-dismiss" style="background:transparent;color:#94a3b8;border:none;font-size:1.1rem;cursor:pointer;padding:0 4px;">✕</button>
        </div>`;
      banner.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#1a3a5c;padding:.75rem 1rem;z-index:9999;box-shadow:0 -4px 20px rgba(0,0,0,.3);';
      document.body.appendChild(banner);
      document.getElementById('btn-install').addEventListener('click',()=>{
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(()=>{ banner.remove(); deferredPrompt=null; });
      });
      document.getElementById('btn-dismiss').addEventListener('click',()=>banner.remove());
    }
  }, 3000);
});
</script>
</body>
</html>
